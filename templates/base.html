<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced RAG Explorer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css', v='kiran-ui-2') }}" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <header class="topbar">
    <div class="brand-wrap">
      <div class="brand">Advanced RAG Explorer</div>
      <div class="owner-pill">Owned by Kiran</div>
    </div>
    <div class="topbar-right">
      <div class="health-pills">
        <span class="pill" id="pill-cases">Cases: --</span>
        <span class="pill" id="pill-llm">LLM: --</span>
        <span class="pill" id="pill-db">DB: --</span>
      </div>
      <nav>
        <a href="/upload">Upload</a>
        <a href="/ingest">Ingest</a>
        <a href="/chunks">Chunks</a>
        <a href="/chat">Chat</a>
        <a href="/static/rag_explorer.html">RAG Explorer HTML</a>
      </nav>
    </div>
  </header>
  <main class="main-shell">
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='app.js', v='kiran-ui-2') }}"></script>
</body>
</html>
